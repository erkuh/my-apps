<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Recipe Vault"/>
<meta name="theme-color" content="#ff6b35"/>
<title>Recipe Vault 🍽️</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --orange:#ff6b35;--orange-mid:#ffd4bc;
  --ink:#1a1208;--gray:#6b6860;--line:#ede9e4;
  --bg:#faf8f5;--white:#ffffff;
  --insta:#e1306c;--insta-bg:#fff0f5;
  --tiktok:#010101;--tiktok-bg:#f0f0f0;
  --red:#ff3b30;--red-bg:#fff0ef;
  --radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.07);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}

header{background:var(--white);border-bottom:1px solid var(--line);padding:16px 20px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:38px;height:38px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;font-size:20px;}
.logo-text{font-weight:700;font-size:18px;letter-spacing:-0.3px;}
.logo-count{font-size:12px;color:var(--gray);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}
.btn-delete-selected{background:var(--red-bg);color:var(--red);border:1.5px solid #ffcfcc;border-radius:10px;padding:9px 14px;font-weight:600;font-size:13px;cursor:pointer;font-family:inherit;display:none;}
.btn-delete-selected.visible{display:block;}
.btn-add{background:var(--orange);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-weight:600;font-size:14px;cursor:pointer;font-family:inherit;}

main{max-width:600px;margin:0 auto;padding:20px 16px 100px;}

.status-bar{background:#fff8f0;border:1px solid #ffd4bc;border-radius:10px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:var(--orange);font-weight:500;display:none;}
.status-bar.visible{display:block;}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;}

.filter-section{margin-bottom:14px;}
.filter-label{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px;}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-pill{background:var(--white);border:1.5px solid var(--line);color:var(--gray);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;transition:all 0.15s;}
.filter-pill.active{background:var(--orange);border-color:var(--orange);color:#fff;font-weight:600;}

.search-container{margin-bottom:18px;position:relative;}
.search-input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px 12px 40px;font-size:15px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--orange);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}

.recipes-grid{display:flex;flex-direction:column;gap:12px;}
.recipe-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1.5px solid transparent;transition:border-color 0.15s;}
.recipe-card.selected{border-color:var(--red);background:#fffafa;}
.recipe-card-inner{display:flex;align-items:stretch;cursor:pointer;}

.card-checkbox{display:none;align-items:center;justify-content:center;padding:0 4px 0 14px;flex-shrink:0;}
.select-mode .card-checkbox{display:flex;}
.checkbox-circle{width:22px;height:22px;border:2px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
.recipe-card.selected .checkbox-circle{background:var(--red);border-color:var(--red);}

.card-thumb{width:80px;min-height:80px;flex-shrink:0;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;}
.card-thumb img{width:100%;height:100%;object-fit:cover;}
.card-body{flex:1;padding:12px 14px;min-width:0;position:relative;padding-right:40px;}
.card-title{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
.source-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;}
.badge-instagram{background:var(--insta-bg);color:var(--insta);}
.badge-tiktok{background:var(--tiktok-bg);color:var(--tiktok);}
.badge-youtube{background:#fff0f0;color:#ff0000;}
.badge-other{background:#f0f0ff;color:#5555cc;}
.cat-tag{font-size:11px;color:var(--gray);background:var(--bg);padding:2px 7px;border-radius:6px;}
.card-tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:11px;color:var(--orange);background:#fff4f0;padding:2px 7px;border-radius:6px;font-weight:500;}
.btn-fav-toggle{position:absolute;top:10px;right:10px;background:none;border:none;font-size:18px;cursor:pointer;outline:none;}

.card-actions{display:flex;border-top:1px solid var(--line);}
.card-btn{flex:1;background:none;border:none;color:var(--gray);font-size:13px;font-weight:500;padding:10px;cursor:pointer;font-family:inherit;transition:color 0.15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.card-btn:hover{color:var(--orange);}
.card-btn+.card-btn{border-left:1px solid var(--line);}
.card-btn.danger:hover{color:var(--red);}

.empty{text-align:center;padding:60px 20px;color:var(--gray);}
.empty-icon{font-size:48px;margin-bottom:14px;}
.empty-title{font-size:18px;font-weight:700;color:var(--ink);margin-bottom:8px;}
.empty-sub{font-size:14px;line-height:1.6;}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.overlay.open{opacity:1;pointer-events:all;}
.panel{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px 48px;width:100%;max-height:94vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease;}
.overlay.open .panel{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 20px;}
.panel-title{font-size:18px;font-weight:700;margin-bottom:20px;}

label.field-label{display:block;font-size:12px;font-weight:600;color:var(--gray);margin-bottom:5px;letter-spacing:0.3px;text-transform:uppercase;}
input[type=text],input[type=url],input[type=search],select,textarea{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;font-size:15px;font-family:inherit;background:var(--bg);color:var(--ink);outline:none;margin-bottom:14px;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--orange);}
textarea{resize:vertical;min-height:80px;}

.thumb-upload-area{border:1.5px dashed var(--line);border-radius:10px;padding:16px;text-align:center;cursor:pointer;margin-bottom:14px;background:var(--bg);position:relative;}
.thumb-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.thumb-preview{width:100%;max-height:180px;object-fit:cover;border-radius:8px;display:none;margin-bottom:8px;}
.thumb-paste-area{border:1.5px dashed var(--line);border-radius:10px;padding:14px;text-align:center;cursor:pointer;margin-bottom:8px;background:var(--bg);font-size:13px;color:var(--gray);}
.thumb-icon{font-size:22px;margin-bottom:5px;}
.thumb-text{font-size:13px;color:var(--gray);}
.btn-remove-thumb{background:var(--red-bg);color:var(--red);border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px;}

.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.slider-row input[type=range]{flex:1;margin:0;}
.slider-val{font-size:13px;color:var(--gray);min-width:35px;text-align:right;}
.divider{height:1px;background:var(--line);margin:14px 0;}

.detail-thumb{width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-bottom:16px;display:none;}
.detail-section-title{font-size:13px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;}
.detail-text{font-size:15px;line-height:1.7;color:var(--ink);margin-bottom:14px;}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.detail-actions{display:flex;gap:10px;margin-top:18px;}
.btn-detail{flex:1;padding:13px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;border:none;}
.btn-edit{background:var(--orange);color:#fff;}
.btn-close-detail{background:var(--bg);color:var(--ink);border:1.5px solid var(--line);}
.btn-delete-detail{background:var(--red-bg);color:var(--red);border:1.5px solid #ffcfcc;}

.form-btns{display:flex;gap:10px;margin-top:8px;}
.btn-save{flex:2;background:var(--orange);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cancel{flex:1;background:var(--bg);color:var(--ink);border:1.5px solid var(--line);border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}

.loading{text-align:center;padding:40px;color:var(--gray);font-size:15px;}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🍽️</div>
    <div>
      <div class="logo-text">Recipe Vault</div>
      <div class="logo-count" id="recipeCount">Loading...</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-delete-selected" id="btnDeleteSelected" onclick="deleteSelected()">🗑 Delete selected</button>
    <button class="btn-add" onclick="openAddPanel()">+ Add Recipe</button>
  </div>
</header>

<main>
  <div class="status-bar" id="statusBar"></div>

  <div class="filter-section">
    <div class="filter-label">Source</div>
    <div class="filter-row" id="sourceFilters"></div>
  </div>
  <div class="filter-section">
    <div class="filter-label">Category</div>
    <div class="filter-row" id="catFilters"></div>
  </div>
  <div class="search-container">
    <span class="search-icon">🔍</span>
    <input type="search" class="search-input" id="searchBar" placeholder="Search recipes, tags, ingredients..." oninput="handleSearch()"/>
  </div>
  <div class="recipes-grid" id="recipesGrid"><div class="loading">Loading your recipes...</div></div>
</main>

<!-- ADD/EDIT PANEL -->
<div class="overlay" id="addOverlay">
  <div class="panel">
    <div class="panel-handle"></div>
    <div class="panel-title" id="panelTitle">Save a recipe video</div>
    <label class="field-label">Video URL *</label>
    <input type="url" id="fUrl" placeholder="Paste Instagram, TikTok, YouTube link..."/>
    <label class="field-label">Recipe name *</label>
    <input type="text" id="fName" placeholder="e.g. Marry Me Chicken"/>
    <label class="field-label">Category</label>
    <select id="fCat">
      <option>Breakfast</option><option>Lunch</option><option selected>Dinner</option>
      <option>Dessert</option><option>Snacks</option><option>Drinks</option><option>Other</option>
    </select>
    <label class="field-label">Tags</label>
    <input type="text" id="fTags" placeholder="e.g. quick, spicy, healthy (comma separated)"/>
    <div class="divider"></div>
    <label class="field-label">Thumbnail photo</label>
    <p style="font-size:13px;color:var(--gray);margin-bottom:10px;">Screenshot from Instagram/TikTok then paste or upload here.</p>
    <div class="thumb-paste-area" id="pasteArea" tabindex="0">
      <div class="thumb-icon">📋</div>
      <div>Tap to paste screenshot</div>
    </div>
    <div class="thumb-upload-area">
      <input type="file" accept="image/*" id="thumbFile" onchange="handleFileUpload(event)"/>
      <img class="thumb-preview" id="thumbPreview"/>
      <div class="thumb-icon">📷</div>
      <div class="thumb-text">Choose from photos</div>
    </div>
    <button class="btn-remove-thumb" id="btnRemoveThumb" style="display:none;" onclick="removeThumb()">Remove photo</button>
    <div class="divider"></div>
    <label class="field-label">Card size</label>
    <div class="slider-row">
      <input type="range" min="60" max="140" value="80" id="cardSizeSlider" oninput="updateSliderVal()"/>
      <span class="slider-val" id="sliderVal">80px</span>
    </div>
    <div class="divider"></div>
    <label class="field-label">Ingredients</label>
    <textarea id="fIngredients" placeholder="One ingredient per line"></textarea>
    <label class="field-label">Instructions</label>
    <textarea id="fInstructions" placeholder="One step per line"></textarea>
    <label class="field-label">Personal notes</label>
    <textarea id="fNotes" placeholder="Tips, substitutions, what you'd change..."></textarea>
    <div class="form-btns">
      <button class="btn-cancel" onclick="closeAddPanel()">Cancel</button>
      <button class="btn-save" id="btnSave" onclick="saveRecipe()">Save Recipe</button>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="overlay" id="detailOverlay">
  <div class="panel">
    <div class="panel-handle"></div>
    <img class="detail-thumb" id="detailThumb"/>
    <div style="margin-bottom:8px;">
      <span id="detailBadge" class="source-badge"></span>
      <span id="detailCat" class="cat-tag" style="margin-left:6px;"></span>
    </div>
    <div class="panel-title" id="detailName" style="margin-top:8px;"></div>
    <div class="detail-tags" id="detailTags"></div>
    <div id="detailUrl" style="margin-bottom:14px;"></div>
    <div id="detailIngSection" style="display:none;">
      <div class="detail-section-title">Ingredients</div>
      <div class="detail-text" id="detailIngredients"></div>
    </div>
    <div id="detailInstSection" style="display:none;">
      <div class="detail-section-title">Instructions</div>
      <div class="detail-text" id="detailInstructions"></div>
    </div>
    <div id="detailNotesSection" style="display:none;">
      <div class="detail-section-title">Notes</div>
      <div class="detail-text" id="detailNotes"></div>
    </div>
    <div class="detail-actions">
      <button class="btn-detail btn-close-detail" onclick="closeDetailPanel()">Close</button>
      <button class="btn-detail btn-edit" onclick="editCurrentRecipe()">Edit</button>
      <button class="btn-detail btn-delete-detail" onclick="deleteCurrentRecipe()">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== SUPABASE SETUP =====
const SUPABASE_URL = "https://ogbwcepylwcvakroflwp.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9nYndjZXB5bHdjdmFrcm9mbHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNzk2NzMsImV4cCI6MjA5Njk1NTY3M30.BSfgiTr0zCe5IZkuev-MENufVU8buj_UKyC4_GYwbRo";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CATS = ['All','⭐ Favorites','Breakfast','Lunch','Dinner','Dessert','Snacks','Drinks','Other'];
const SOURCES = ['All','Instagram','TikTok','YouTube','Other'];

let recipes = [];
let activeSource = 'All';
let activeCat = 'All';
let searchQuery = '';
let selectMode = false;
let selectedIds = [];
let currentDetailId = null;
let editingId = null;
let thumbData = null;

// ===== HELPERS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function showStatus(msg) {
  const el = document.getElementById('statusBar');
  el.textContent = msg;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 4000);
}

function getPlatform(url) {
  if (!url) return 'other';
  const u = url.toLowerCase();
  if (u.includes('instagram.com')) return 'instagram';
  if (u.includes('tiktok.com')) return 'tiktok';
  if (u.includes('youtube.com') || u.includes('youtu.be')) return 'youtube';
  return 'other';
}
function getPlatformLabel(p) { return {instagram:'Instagram',tiktok:'TikTok',youtube:'YouTube',other:'Web'}[p]||'Web'; }
function getPlatformEmoji(p) { return {instagram:'📸',tiktok:'🎵',youtube:'▶️',other:'🔗'}[p]||'🔗'; }

// ===== LOAD RECIPES — no thumb in list query to avoid timeout =====
async function loadRecipes() {
  try {
    const { data, error } = await db
      .from('recipes')
      .select('id, name, url, cat, tags, card_size, favorite, added_at')
      .order('added_at', { ascending: false })
      .timeout(8000);

    if (error) throw error;
    recipes = data.map(r => ({
      id: r.id, name: r.name, url: r.url, cat: r.cat,
      tags: r.tags, cardSize: r.card_size,
      favorite: r.favorite || false, addedAt: r.added_at,
      thumb: null // loaded on demand when viewing detail
    }));
    renderAll();
  } catch(e) {
    console.error('Load error:', e);
    // Fallback: try without ordering
    try {
      const { data, error } = await db
        .from('recipes')
        .select('id, name, url, cat, tags, card_size, favorite');
      if (error) throw error;
      recipes = data.map(r => ({
        id: r.id, name: r.name, url: r.url, cat: r.cat,
        tags: r.tags, cardSize: r.card_size,
        favorite: r.favorite || false, thumb: null
      }));
      renderAll();
      showStatus('⚠️ Loaded in offline mode — some features may be limited');
    } catch(e2) {
      document.getElementById('recipesGrid').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-title">Could not connect</div><div class="empty-sub">Check your internet connection and refresh.</div></div>`;
      document.getElementById('recipeCount').textContent = 'Offline';
    }
  }
}

// Load full recipe including thumb for detail view
async function loadFullRecipe(id) {
  try {
    const { data, error } = await db.from('recipes').select('*').eq('id', id).single();
    if (error) throw error;
    return data;
  } catch(e) {
    return null;
  }
}

// ===== RENDER =====
function renderAll() {
  renderFilters();
  const count = recipes.length;
  document.getElementById('recipeCount').textContent = count + ' recipe' + (count !== 1 ? 's' : '');

  let filtered = [...recipes];
  if (activeSource !== 'All') filtered = filtered.filter(r => getPlatformLabel(getPlatform(r.url)).toLowerCase() === activeSource.toLowerCase());
  if (activeCat === '⭐ Favorites') filtered = filtered.filter(r => r.favorite);
  else if (activeCat !== 'All') filtered = filtered.filter(r => r.cat === activeCat);
  if (searchQuery) filtered = filtered.filter(r =>
    (r.name||'').toLowerCase().includes(searchQuery) ||
    (r.tags||'').toLowerCase().includes(searchQuery)
  );
  filtered.sort((a,b) => (b.favorite?1:0)-(a.favorite?1:0));

  const grid = document.getElementById('recipesGrid');
  if (selectMode) {
    grid.className = 'recipes-grid select-mode';
    document.getElementById('btnDeleteSelected').classList.add('visible');
    document.getElementById('btnDeleteSelected').textContent = `🗑 Delete (${selectedIds.length})`;
  } else {
    grid.className = 'recipes-grid';
    document.getElementById('btnDeleteSelected').classList.remove('visible');
  }

  if (!count) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🍳</div><div class="empty-title">Your vault is empty</div><div class="empty-sub">Tap "+ Add Recipe" to get started!</div></div>`;
    return;
  }
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try different filters.</div></div>`;
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const p = getPlatform(r.url);
    const isSelected = selectedIds.includes(r.id);
    const tags = r.tags ? r.tags.split(',').map(t=>t.trim()).filter(Boolean) : [];
    const size = r.cardSize || 80;
    return `<div class="recipe-card ${isSelected?'selected':''}" id="card_${r.id}">
      <div class="recipe-card-inner" onclick="openDetail('${r.id}')">
        <div class="card-checkbox" onclick="event.stopPropagation()">
          <div class="checkbox-circle" onclick="toggleSelect('${r.id}')">
            ${isSelected?'<svg width="11" height="11" fill="none" stroke="#fff" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>':''}
          </div>
        </div>
        <div class="card-thumb" style="width:${size}px;min-height:${size}px;">
          <span>${getPlatformEmoji(p)}</span>
        </div>
        <div class="card-body">
          <button class="btn-fav-toggle" onclick="event.stopPropagation();toggleFavorite('${r.id}')">${r.favorite?'⭐':'☆'}</button>
          <div class="card-title">${r.name}</div>
          <div class="card-meta">
            <span class="source-badge badge-${p}">${getPlatformLabel(p)}</span>
            <span class="cat-tag">${r.cat}</span>
          </div>
          ${tags.length?`<div class="card-tags">${tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}
        </div>
      </div>
      <div class="card-actions">
        <button class="card-btn" onclick="startEdit('${r.id}')">✏️ Edit</button>
        <button class="card-btn" onclick="${r.url?`window.open('${r.url}','_blank')`:'toast(\'No link\')'}">🔗 Open</button>
        <button class="card-btn danger" onclick="startSelectForDelete('${r.id}')">🗑 Delete</button>
      </div>
    </div>`;
  }).join('');
}

function renderFilters() {
  document.getElementById('sourceFilters').innerHTML = SOURCES.map(s =>
    `<button class="filter-pill ${activeSource===s?'active':''}" onclick="setSource('${s}')">${s}</button>`).join('');
  document.getElementById('catFilters').innerHTML = CATS.map(c =>
    `<button class="filter-pill ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setSource(s){activeSource=s;renderAll();}
function setCat(c){activeCat=c;renderAll();}
function handleSearch(){searchQuery=document.getElementById('searchBar').value.toLowerCase().trim();renderAll();}

// ===== SELECT / DELETE =====
function toggleSelect(id){
  const idx=selectedIds.indexOf(id);
  if(idx>=0)selectedIds.splice(idx,1);else selectedIds.push(id);
  if(!selectedIds.length)selectMode=false;
  renderAll();
}
function startSelectForDelete(id){
  selectMode=true;
  if(!selectedIds.includes(id))selectedIds.push(id);
  renderAll();
}
async function deleteSelected(){
  if(!selectedIds.length){toast('Nothing selected');return;}
  if(!confirm(`Delete ${selectedIds.length} recipe(s)?`))return;
  const {error}=await db.from('recipes').delete().in('id',selectedIds);
  if(error){toast('Error deleting');return;}
  selectedIds=[];selectMode=false;
  await loadRecipes();toast('Deleted!');
}

// ===== FAVOURITE =====
async function toggleFavorite(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  const newVal=!r.favorite;
  r.favorite=newVal;
  renderAll();
  const {error}=await db.from('recipes').update({favorite:newVal}).eq('id',id);
  if(error){r.favorite=!newVal;renderAll();toast('Error updating');}
}

// ===== ADD PANEL =====
function openAddPanel(){
  editingId=null;thumbData=null;
  document.getElementById('panelTitle').textContent='Save a recipe video';
  document.getElementById('fUrl').value='';
  document.getElementById('fName').value='';
  document.getElementById('fCat').value='Dinner';
  document.getElementById('fTags').value='';
  document.getElementById('fIngredients').value='';
  document.getElementById('fInstructions').value='';
  document.getElementById('fNotes').value='';
  document.getElementById('cardSizeSlider').value=80;
  document.getElementById('sliderVal').textContent='80px';
  document.getElementById('thumbPreview').style.display='none';
  document.getElementById('btnRemoveThumb').style.display='none';
  document.getElementById('thumbFile').value='';
  document.getElementById('btnSave').textContent='Save Recipe';
  document.getElementById('addOverlay').classList.add('open');
}
function closeAddPanel(){document.getElementById('addOverlay').classList.remove('open');}
function updateSliderVal(){document.getElementById('sliderVal').textContent=document.getElementById('cardSizeSlider').value+'px';}
function handleFileUpload(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    thumbData=ev.target.result;
    document.getElementById('thumbPreview').src=thumbData;
    document.getElementById('thumbPreview').style.display='block';
    document.getElementById('btnRemoveThumb').style.display='block';
  };
  reader.readAsDataURL(file);
}
function removeThumb(){
  thumbData=null;
  document.getElementById('thumbPreview').style.display='none';
  document.getElementById('btnRemoveThumb').style.display='none';
  document.getElementById('thumbFile').value='';
}
document.getElementById('pasteArea').addEventListener('paste',e=>{
  for(let item of e.clipboardData.items){
    if(item.type.startsWith('image/')){
      const reader=new FileReader();
      reader.onload=ev=>{
        thumbData=ev.target.result;
        document.getElementById('thumbPreview').src=thumbData;
        document.getElementById('thumbPreview').style.display='block';
        document.getElementById('btnRemoveThumb').style.display='block';
        toast('Image pasted!');
      };
      reader.readAsDataURL(item.getAsFile());
      break;
    }
  }
});

async function saveRecipe(){
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('Please enter a recipe name');return;}
  document.getElementById('btnSave').textContent='Saving...';
  const data={
    name,
    url:document.getElementById('fUrl').value.trim(),
    cat:document.getElementById('fCat').value,
    tags:document.getElementById('fTags').value,
    ingredients:document.getElementById('fIngredients').value.trim(),
    instructions:document.getElementById('fInstructions').value.trim(),
    notes:document.getElementById('fNotes').value.trim(),
    card_size:parseInt(document.getElementById('cardSizeSlider').value),
    thumb:thumbData
  };
  if(editingId){
    const {error}=await db.from('recipes').update(data).eq('id',editingId);
    if(error){toast('Error saving');document.getElementById('btnSave').textContent='Save Recipe';return;}
    toast('Recipe updated! ✅');
  } else {
    const {error}=await db.from('recipes').insert([{id:uid(),favorite:false,...data}]);
    if(error){toast('Error saving: '+error.message);document.getElementById('btnSave').textContent='Save Recipe';return;}
    toast('Recipe saved! ✅');
  }
  closeAddPanel();
  await loadRecipes();
}

// ===== DETAIL =====
async function openDetail(id){
  currentDetailId=id;
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  document.getElementById('detailName').textContent=r.name;
  document.getElementById('detailBadge').textContent=getPlatformLabel(getPlatform(r.url));
  document.getElementById('detailBadge').className=`source-badge badge-${getPlatform(r.url)}`;
  document.getElementById('detailCat').textContent=(r.favorite?'⭐ ':'')+r.cat;
  const tags=r.tags?r.tags.split(',').map(t=>t.trim()).filter(Boolean):[];
  document.getElementById('detailTags').innerHTML=tags.map(t=>`<span class="tag">#${t}</span>`).join('');
  document.getElementById('detailUrl').innerHTML=r.url?`<a href="${r.url}" target="_blank" style="color:var(--orange);font-size:14px;">🔗 Open original video</a>`:'';
  document.getElementById('detailThumb').style.display='none';
  document.getElementById('detailIngSection').style.display='none';
  document.getElementById('detailInstSection').style.display='none';
  document.getElementById('detailNotesSection').style.display='none';
  document.getElementById('detailOverlay').classList.add('open');

  // Load full recipe in background
  const full=await loadFullRecipe(id);
  if(full){
    if(full.thumb){
      document.getElementById('detailThumb').src=full.thumb;
      document.getElementById('detailThumb').style.display='block';
    }
    if(full.ingredients){
      document.getElementById('detailIngSection').style.display='block';
      document.getElementById('detailIngredients').innerHTML=full.ingredients.split('\n').filter(l=>l.trim()).map(l=>`<div style="margin-bottom:4px;">• ${l}</div>`).join('');
    }
    if(full.instructions){
      document.getElementById('detailInstSection').style.display='block';
      let n=1;
      document.getElementById('detailInstructions').innerHTML=full.instructions.split('\n').filter(l=>l.trim()).map(l=>{
        const clean=l.trim().replace(/^\d+[\s\.\,\-\)]+/,'');
        return `<div style="display:flex;gap:8px;margin-bottom:10px;align-items:flex-start;"><span style="background:var(--orange-mid);color:var(--orange);font-weight:700;font-size:12px;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">${n++}</span><span style="flex:1;padding-top:2px;">${clean}</span></div>`;
      }).join('');
    }
    if(full.notes){
      document.getElementById('detailNotesSection').style.display='block';
      document.getElementById('detailNotes').textContent=full.notes;
    }
    // Store full data for editing
    const idx=recipes.findIndex(x=>x.id===id);
    if(idx>=0)recipes[idx]={...recipes[idx],ingredients:full.ingredients,instructions:full.instructions,notes:full.notes,thumb:full.thumb,cardSize:full.card_size};
  }
}

function closeDetailPanel(){document.getElementById('detailOverlay').classList.remove('open');}
function editCurrentRecipe(){closeDetailPanel();startEdit(currentDetailId);}

async function deleteCurrentRecipe(){
  if(!confirm('Delete this recipe?'))return;
  const {error}=await db.from('recipes').delete().eq('id',currentDetailId);
  if(error){toast('Error deleting');return;}
  closeDetailPanel();await loadRecipes();toast('Deleted!');
}

async function startEdit(id){
  const r=recipes.find(x=>x.id===id);
  if(!r)return;
  // Load full data if not already loaded
  let full=r;
  if(!r.ingredients&&!r.thumb){
    const loaded=await loadFullRecipe(id);
    if(loaded)full={...r,ingredients:loaded.ingredients,instructions:loaded.instructions,notes:loaded.notes,thumb:loaded.thumb,cardSize:loaded.card_size};
  }
  editingId=id;thumbData=full.thumb||null;
  document.getElementById('panelTitle').textContent='Edit recipe';
  document.getElementById('fUrl').value=full.url||'';
  document.getElementById('fName').value=full.name||'';
  document.getElementById('fCat').value=full.cat||'Dinner';
  document.getElementById('fTags').value=full.tags||'';
  document.getElementById('fIngredients').value=full.ingredients||'';
  document.getElementById('fInstructions').value=full.instructions||'';
  document.getElementById('fNotes').value=full.notes||'';
  document.getElementById('cardSizeSlider').value=full.cardSize||80;
  document.getElementById('sliderVal').textContent=(full.cardSize||80)+'px';
  document.getElementById('btnSave').textContent='Update Recipe';
  if(full.thumb){
    document.getElementById('thumbPreview').src=full.thumb;
    document.getElementById('thumbPreview').style.display='block';
    document.getElementById('btnRemoveThumb').style.display='block';
  } else {
    document.getElementById('thumbPreview').style.display='none';
    document.getElementById('btnRemoveThumb').style.display='none';
  }
  document.getElementById('addOverlay').classList.add('open');
}

document.getElementById('addOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('addOverlay'))closeAddPanel();});
document.getElementById('detailOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('detailOverlay'))closeDetailPanel();});

loadRecipes();
</script>
</body>
